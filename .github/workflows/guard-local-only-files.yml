name: Guard Local-Only Files

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  guard-local-only-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ensure local-only files are not tracked
        run: python scripts/check_no_local_only_files.py
